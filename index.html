<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Nodes Info - Premium Server Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.65), rgba(3, 7, 18, 0.85)), url('background.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .premium-glass {
            background: rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.65), inset 0 1px 2px rgba(255, 255, 255, 0.05);
        }
        .glass-animate {
            animation: fluidEntrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes fluidEntrance {
            from { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes subtleFloat {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3)); }
            50% { transform: translateY(-10px); filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6)); }
        }
        .smooth-loader { animation: subtleFloat 1.6s ease-in-out infinite; }
        .text-shimmer {
            background: linear-gradient(to right, #fff 20%, #a5b4fc 40%, #60a5fa 60%, #fff 80%);
            background-size: 200% auto;
            animation: shimmer 4s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease; }
    </style>
</head>
<body class="text-gray-100 font-sans antialiased min-h-screen relative overflow-x-hidden">

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'hover') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.015, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(320, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.22);
            }
        }
        function toggleSidebar(open) {
            playSound('click');
            const sidebar = document.getElementById('account-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (open) { sidebar.classList.remove('translate-x-full'); overlay.classList.remove('hidden', 'opacity-0'); overlay.classList.add('opacity-100'); }
            else { sidebar.classList.add('translate-x-full'); overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0'); }
        }
    </script>

    <div id="sidebar-overlay" onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <div id="account-sidebar" class="fixed top-0 right-0 h-full w-80 bg-slate-950/90 border-l border-white/10 premium-glass z-50 translate-x-full sidebar-transition p-6 flex flex-col justify-between">
        <div>
            <div class="flex justify-between items-center border-b border-white/5 pb-4 mb-6">
                <h2 class="text-md font-black tracking-wider text-blue-400 uppercase"><i class="fa-solid fa-user-shield mr-2"></i>Profile</h2>
                <button onclick="toggleSidebar(false)" class="text-gray-400 hover:text-white w-8 h-8 rounded-lg hover:bg-white/5 flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="space-y-5">
                <div class="bg-white/5 border border-white/5 p-4 rounded-xl">
                    <span class="text-[10px] uppercase text-gray-400 font-bold tracking-wider block">Authorized Session</span>
                    <span id="user-name-display" class="text-white font-black text-base">User</span>
                </div>
            </div>
        </div>
        <button onclick="window.location.reload()" class="w-full bg-red-600/10 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/20 py-3 rounded-xl font-bold uppercase text-xs">Logout</button>
    </div>

    <div id="login-page" class="flex items-center justify-center min-h-screen px-4 relative z-10">
        <div class="glass-animate premium-glass p-8 rounded-2xl max-w-md w-full border-blue-500/10 shadow-[0_0_50px_rgba(59,130,246,0.15)]">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl mb-4 border border-blue-500/30 overflow-hidden">
                    <img src="logo.jpg" alt="Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="text-2xl font-black tracking-widest text-shimmer">GT NODES INFO</h1>
                <p class="text-gray-400 text-xs mt-1 uppercase tracking-wider">Login with Panel Account</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-gray-400 text-xs font-semibold uppercase block mb-2">Panel Email</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-4 text-gray-500 text-sm"></i>
                        <input type="email" id="user-email" placeholder="user@gmail.com" class="w-full pl-11 pr-4 py-3.5 bg-gray-950/50 border border-white/10 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                    </div>
                </div>
                <div>
                    <label class="text-gray-400 text-xs font-semibold uppercase block mb-2">Panel Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-4 text-gray-500 text-sm"></i>
                        <input type="password" id="user-password" placeholder="••••••••" class="w-full pl-11 pr-4 py-3.5 bg-gray-950/50 border border-white/10 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                    </div>
                </div>
                <button onclick="loginWithPanelCredentials()" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-3.5 rounded-xl uppercase text-sm mt-2">Connect Dashboard</button>
                <p id="status-log" class="text-xs text-blue-400 bg-blue-950/40 p-2.5 rounded-xl hidden text-center"></p>
                <p id="error-msg" class="text-red-400 bg-red-950/40 text-sm p-3 rounded-xl hidden text-center animate-pulse"></p>
            </div>
        </div>
    </div>

    <div id="dashboard-page" class="max-w-6xl mx-auto px-4 py-8 hidden relative z-10">
        <div class="glass-animate premium-glass rounded-2xl p-6 mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-black text-white tracking-wide">GT NODES INFO</h1>
            <button onclick="toggleSidebar(true)" class="bg-blue-600/10 text-blue-400 border border-blue-500/20 w-11 h-11 rounded-xl flex items-center justify-center"><i class="fa-solid fa-bars text-lg"></i></button>
        </div>
        <div id="server-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        async function loginWithPanelCredentials() {
            const email = document.getElementById('user-email').value.trim();
            const password = document.getElementById('user-password').value.trim();
            const errorElement = document.getElementById('error-msg');
            const statusLog = document.getElementById('status-log');

            if(!email || !password) {
                playSound('error');
                errorElement.innerText = "Error: Email and Password required!";
                errorElement.classList.remove('hidden');
                return;
            }

            errorElement.classList.add('hidden');
            statusLog.classList.remove('hidden');
            statusLog.innerText = `Connecting via Netlify Secure Matrix Proxy...`;

            try {
                const res = await fetch("/panel-api", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Invalid Credentials");

                statusLog.classList.add('hidden');
                playSound('success');

                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard-page').classList.remove('hidden');
                document.getElementById('user-name-display').innerText = data.username;

                renderServers(data.servers);
            } catch (err) {
                playSound('error');
                statusLog.classList.add('hidden');
                errorElement.innerText = err.message;
                errorElement.classList.remove('hidden');
            }
        }

        function renderServers(servers) {
            const serverList = document.getElementById('server-list');
            serverList.innerHTML = "";
            if(!servers || servers.length === 0) {
                serverList.innerHTML = `<p class="text-gray-400 text-center col-span-3 py-10 bg-white/5 rounded-xl">No active servers found.</p>`;
                return;
            }
            servers.forEach(srv => {
                const attr = srv.attributes;
                const ramLimit = attr.limits.memory === 0 ? 'Unlimited' : attr.limits.memory + ' MB';
                const cpuLimit = attr.limits.cpu === 0 ? 'Unlimited' : attr.limits.cpu + '%';
                const card = `
                    <div class="premium-glass p-5 rounded-xl border border-white/5 space-y-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-white font-black text-base">${attr.name}</h3>
                                <span class="text-[10px] text-gray-400 font-mono break-all bg-gray-950/40 px-2 py-0.5 rounded border border-white/5 mt-1 inline-block">${attr.identifier}</span>
                            </div>
                            <span class="bg-green-500/10 text-green-400 border border-green-500/20 px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase">Active</span>
                        </div>
                        <div class="space-y-2 text-xs text-gray-300 border-t border-white/5 pt-3">
                            <p class="flex justify-between"><span>CPU Limit:</span> <span class="font-bold text-white">${cpuLimit}</span></p>
                            <p class="flex justify-between"><span>RAM Limit:</span> <span class="font-bold text-white">${ramLimit}</span></p>
                        </div>
                    </div>
                `;
                serverList.innerHTML += card;
            });
        }
    </script>
</body>
</html>
